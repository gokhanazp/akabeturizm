<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Mescid-i Haram ve Kâbe illüstrasyonu">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0707"/>
      <stop offset="38%" stop-color="#3a0f10"/>
      <stop offset="66%" stop-color="#6e1f20"/>
      <stop offset="100%" stop-color="#8a2526"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="74%" r="55%">
      <stop offset="0%" stop-color="#f4d58a" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#d4a64a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a64a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d58a"/>
      <stop offset="50%" stop-color="#d4a64a"/>
      <stop offset="100%" stop-color="#9a6f24"/>
    </linearGradient>
    <linearGradient id="kaaba" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241b1b"/>
      <stop offset="100%" stop-color="#0c0707"/>
    </linearGradient>
    <linearGradient id="kaabaSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15100f"/>
      <stop offset="100%" stop-color="#070404"/>
    </linearGradient>
  </defs>

  <!-- Gökyüzü -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Yıldızlar -->
  <g fill="#fbe6c0">
    <circle cx="120" cy="90" r="1.6" opacity="0.8"/>
    <circle cx="260" cy="150" r="1.1" opacity="0.6"/>
    <circle cx="420" cy="70" r="1.4" opacity="0.7"/>
    <circle cx="560" cy="130" r="1" opacity="0.5"/>
    <circle cx="900" cy="80" r="1.3" opacity="0.7"/>
    <circle cx="1080" cy="140" r="1" opacity="0.5"/>
    <circle cx="1240" cy="90" r="1.6" opacity="0.8"/>
    <circle cx="1400" cy="160" r="1.1" opacity="0.6"/>
    <circle cx="1520" cy="100" r="1.3" opacity="0.7"/>
    <circle cx="700" cy="60" r="1" opacity="0.5"/>
  </g>

  <!-- Hilal (logodan esinli) -->
  <g transform="translate(1360,150)">
    <path d="M0,-46 A46,46 0 1 0 0,46 A36,36 0 1 1 0,-46 Z" fill="url(#gold)" opacity="0.9"/>
  </g>

  <!-- Arka plan: Mescid-i Haram revak silüeti -->
  <g fill="#2a1011" opacity="0.95">
    <rect x="0" y="470" width="1600" height="160"/>
    <!-- Kemerli revaklar -->
    <g fill="#330f10">
      <!-- soldan sağa kemer dizisi -->
      <g>
        <rect x="20" y="430" width="60" height="200"/>
        <path d="M20 430 q30 -40 60 0 Z" />
      </g>
    </g>
  </g>

  <!-- Kemerli kolonad (tekrarlı) -->
  <g fill="#3a1213">
    <g id="arches">
      <path d="M40 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M150 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M260 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M370 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M1160 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M1270 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M1380 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
      <path d="M1490 620 V470 a34 38 0 0 1 68 0 V620 Z"/>
    </g>
  </g>

  <!-- Minareler -->
  <g fill="#3a1213">
    <g>
      <rect x="120" y="250" width="26" height="240"/>
      <path d="M120 250 l13 -46 l13 46 Z" fill="url(#gold)" opacity="0.85"/>
      <rect x="116" y="300" width="34" height="8"/>
    </g>
    <g>
      <rect x="1454" y="250" width="26" height="240"/>
      <path d="M1454 250 l13 -46 l13 46 Z" fill="url(#gold)" opacity="0.85"/>
      <rect x="1450" y="300" width="34" height="8"/>
    </g>
  </g>

  <!-- Işık hüzmesi / glow -->
  <ellipse cx="800" cy="640" rx="520" ry="300" fill="url(#glow)"/>

  <!-- KÂBE -->
  <g transform="translate(800,470)">
    <!-- yan yüz (perspektif) -->
    <polygon points="120,40 230,80 230,330 120,300" fill="url(#kaabaSide)"/>
    <!-- ön yüz -->
    <rect x="-120" y="20" width="240" height="300" fill="url(#kaaba)"/>
    <!-- üst kapak -->
    <polygon points="-120,20 120,20 230,80 -10,40" fill="#1c1414"/>

    <!-- Altın kuşak (hizam) - ön -->
    <rect x="-120" y="70" width="240" height="26" fill="url(#gold)"/>
    <g fill="#3a0f10" opacity="0.6">
      <rect x="-108" y="76" width="14" height="14"/>
      <rect x="-78" y="76" width="14" height="14"/>
      <rect x="-48" y="76" width="14" height="14"/>
      <rect x="-18" y="76" width="14" height="14"/>
      <rect x="14" y="76" width="14" height="14"/>
      <rect x="44" y="76" width="14" height="14"/>
      <rect x="74" y="76" width="14" height="14"/>
      <rect x="100" y="76" width="14" height="14"/>
    </g>
    <!-- Altın kuşak - yan -->
    <polygon points="120,76 230,116 230,142 120,102" fill="url(#gold)"/>

    <!-- Kapı -->
    <rect x="35" y="150" width="46" height="170" fill="url(#gold)"/>
    <rect x="42" y="160" width="32" height="160" fill="#0c0707"/>
    <rect x="42" y="160" width="32" height="160" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Tavaf eden kalabalık silüeti -->
  <g fill="#1c0a0b">
    <ellipse cx="800" cy="800" rx="620" ry="90" opacity="0.9"/>
  </g>
  <g fill="#120708">
    <g id="crowd">
      <!-- basit insan silüetleri -->
      <g>
        <circle cx="300" cy="770" r="9"/><rect x="291" y="778" width="18" height="34" rx="8"/>
      </g>
    </g>
  </g>
  <!-- Kalabalık tekrarı -->
  <g fill="#160809">
    <use href="#crowd" transform="translate(60,6)"/>
    <use href="#crowd" transform="translate(140,12)"/>
    <use href="#crowd" transform="translate(230,4)"/>
    <use href="#crowd" transform="translate(330,14)"/>
    <use href="#crowd" transform="translate(430,8)"/>
    <use href="#crowd" transform="translate(540,16)"/>
    <use href="#crowd" transform="translate(650,6)"/>
    <use href="#crowd" transform="translate(760,14)"/>
    <use href="#crowd" transform="translate(870,8)"/>
    <use href="#crowd" transform="translate(980,16)"/>
    <use href="#crowd" transform="translate(1080,6)"/>
  </g>

  <!-- Hafif vinyet -->
  <rect width="1600" height="900" fill="#000000" opacity="0.0"/>
</svg>
